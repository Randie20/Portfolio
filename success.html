<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Message Sent — Randy Lutta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Neumorphic color palette from the UI kit
            neumo_bg: '#f5f1ea', // Main background
            neumo_accent: '#156064', // Teal accent
            neumo_element: '#faf7f2', // Elevated panels
          },
          boxShadow: {
            // Raised panel effect
            neumo_raised: '5px_5px_10px_#e3ddd4,-5px_-5px_10px_#ffffff',
            // Small raised panel effect (tabs, icons)
            neumo_raised_sm: '3px_3px_6px_#e3ddd4,-3px_-3px_6px_#ffffff',
            // Inset panel effect (inputs, active tabs)
            neumo_inset: 'inset_3px_3px_6px_#e3ddd4,inset_-3px_-3px_6px_#ffffff',
          },
        },
      },
    };
  </script>
</head>
<body class="bg-neumo_bg text-gray-800 antialiased h-screen flex items-center justify-center font-sans">
  <div class="max-w-md w-full mx-auto px-6 text-center">
    <div class="bg-neumo_element p-10 rounded-3xl shadow-neumo_raised border border-gray-100">
      <div class="w-16 h-16 bg-gray-100 text-neumo_accent rounded-full flex items-center justify-center mx-auto mb-6 shadow-neumo_raised">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold mb-3 text-gray-900">Message Sent!</h1>
      <p class="text-gray-700 leading-relaxed mb-8">Thanks for reaching out. I've received your message and will get back to you shortly.</p>
      <a href="/" class="inline-block px-7 py-3 bg-neumo_accent text-white rounded-full shadow-neumo_raised hover:shadow-neumo_raised_sm transition-all font-medium">
        Return to Portfolio
      </a>
    </div>
  </div>
</body>
</html>
